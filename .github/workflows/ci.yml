name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile (syntax check, stdlib only)
        run: python -m py_compile watcher.py adapters.py
      - name: Validate example config is valid JSON
        run: python -c "import json; json.load(open('config.example.json'))"
